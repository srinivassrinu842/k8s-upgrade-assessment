[flake8]
max-line-length = 120
extend-ignore =
    # E203: whitespace before ':' — black and flake8 disagree here
    E203,
    # W503: line break before binary operator — black style
    W503
exclude =
    .git,
    __pycache__,
    .mypy_cache,
    .pytest_cache,
    dist,
    build,
    *.egg-info
